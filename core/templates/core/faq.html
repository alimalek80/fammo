{% extends "base.html" %}

{% block content %}
<section class="py-24 bg-slate-50">
    <div class="max-w-3xl mx-auto px-4">

        <div class="text-center mb-16">
            <h2 class="text-3xl font-black mb-4">Frequently Asked Questions</h2>
            <div class="w-16 h-1 bg-yellow-400 mx-auto"></div>
        </div>

        <div class="space-y-4">

            {% for faq in faqs %}
            <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">

                <button
                    class="w-full p-5 text-left font-bold flex justify-between items-center hover:bg-slate-50"
                    onclick="toggleFaq(this)">

                    {{ faq.question }}

                    <i data-lucide="chevron-down" class="w-5 h-5 transition-transform"></i>
                </button>

                <div class="px-5 pb-5 text-slate-500 text-sm hidden">
                    {{ faq.answer|linebreaks }}
                </div>

            </div>
            {% endfor %}

        </div>
    </div>
</section>

<script>
function toggleFaq(button) {
    const body = button.nextElementSibling;
    const icon = button.querySelector("[data-lucide]");

    body.classList.toggle("hidden");
    icon.classList.toggle("rotate-180");
}
</script>

{% endblock %}
